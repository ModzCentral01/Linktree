<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Modding X Control Panel</title>

<!-- Rubik Font -->
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(180deg, #0b0014, #14002a);
    font-family: 'Rubik', sans-serif;
    color: #fff;
    margin: 0;
}

.navbar {
    background: #0d001c;
    border-bottom: 2px solid #7b00ff;
}

.navbar-brand {
    font-weight: 800;
    color: #a855f7 !important;
}

.section {
    padding: 25px 15px;
}

.card {
    background: #160029;
    border: 1px solid #7b00ff33;
    border-radius: 15px;
    margin-bottom: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 15px #7b00ff66;
}

.btn-purple {
    background: #7b00ff;
    border: none;
    color: white;
}

.btn-purple:hover {
    background: #9a2bff;
}

.stat-box {
    background: #120022;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 15px;
}

.footer {
    text-align: center;
    font-size: 12px;
    padding: 20px;
    opacity: 0.6;
}
</style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <span class="navbar-brand">🎮 Modding X Control</span>
  </div>
</nav>

<div class="container section">

<!-- USER INFO -->
<div class="card p-3">
    <h5>👤 User Panel</h5>
    <div id="userInfo">Loading...</div>
</div>

<!-- GAMING SECTION -->
<div class="card p-3">
    <h5>🎮 Gaming & Modding</h5>
    <p>Access tools, gaming services and mod support.</p>
    <button class="btn btn-purple w-100 mb-2" onclick="openTelegram('https://t.me/ModdingXZ')">Join Main Channel</button>
    <button class="btn btn-outline-light w-100 mb-2" onclick="openTelegram('https://t.me/ModdingXZ_Support')">Support Chat</button>
    <button class="btn btn-outline-light w-100" onclick="alert('Coming Soon')">Game Tools</button>
</div>

<!-- SUPPORT SYSTEM -->
<div class="card p-3">
    <h5>🛠 Support Centre</h5>
    <form onsubmit="submitTicket(event)">
        <input type="text" id="issue" class="form-control mb-2" placeholder="Describe your issue..." required>
        <button class="btn btn-purple w-100">Submit Ticket</button>
    </form>
    <div id="ticketStatus" class="mt-2 small"></div>
</div>

<!-- LIVE STATS -->
<div class="card p-3">
    <h5>📊 Live Stats</h5>
    <div class="row">
        <div class="col-4">
            <div class="stat-box">
                <div id="onlineUsers">0</div>
                <small>Online</small>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-box">
                <div id="ticketsOpen">0</div>
                <small>Tickets</small>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-box">
                <div id="membersCount">0</div>
                <small>Members</small>
            </div>
        </div>
    </div>
</div>

<!-- TEXTURE GENERATOR -->
<div class="card p-3">
    <h5>🎨 Dynamic Texture Generator</h5>
    <button class="btn btn-purple w-100 mb-2" onclick="generateTexture()">Generate Texture</button>
    <canvas id="textureCanvas" width="300" height="200" style="width:100%;border-radius:12px;"></canvas>
</div>

</div>

<div class="footer">
Modding X © 2026 | Telegram Web App
</div>

<script>
// Telegram WebApp Init
if (window.Telegram?.WebApp) {
    Telegram.WebApp.expand();
}

// USER INFO
if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
    const user = Telegram.WebApp.initDataUnsafe.user;
    document.getElementById("userInfo").innerHTML =
        "<b>Name:</b> " + user.first_name + "<br>" +
        "<b>ID:</b> " + user.id;
} else {
    document.getElementById("userInfo").innerHTML = "Opened outside Telegram.";
}

// OPEN TELEGRAM LINKS
function openTelegram(link){
    window.location.href = link;
}

// FAKE LIVE STATS
function randomStats(){
    document.getElementById("onlineUsers").innerText = Math.floor(Math.random()*150)+50;
    document.getElementById("ticketsOpen").innerText = Math.floor(Math.random()*10);
    document.getElementById("membersCount").innerText = Math.floor(Math.random()*5000)+1000;
}
setInterval(randomStats, 3000);
randomStats();

// SUPPORT TICKET
function submitTicket(e){
    e.preventDefault();
    document.getElementById("ticketStatus").innerText = "Ticket submitted successfully.";
    document.getElementById("issue").value = "";
}

// TEXTURE GENERATOR
function generateTexture(){
    const canvas = document.getElementById("textureCanvas");
    const ctx = canvas.getContext("2d");

    for(let i=0;i<1000;i++){
        ctx.fillStyle = "hsl(" + Math.random()*360 + ", 100%, 50%)";
        ctx.fillRect(Math.random()*300, Math.random()*200, 2, 2);
    }
}
</script>

</body>
</html>
