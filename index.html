<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Rubik Font -->
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#6366f1;
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
}

body {
    font-family:'Rubik',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

/* Animated background texture */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:radial-gradient(circle at 20% 30%,#1e3a8a,transparent),
               radial-gradient(circle at 80% 70%,#6366f1,transparent);
    animation:moveBG 15s linear infinite;
    z-index:-1;
}
@keyframes moveBG{
    0%{transform:translate(0,0)}
    50%{transform:translate(-10%,-10%)}
    100%{transform:translate(0,0)}
}

.card-custom{
    background:var(--card);
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.05);
    transition:.3s;
}

.card-custom:hover{
    transform:translateY(-6px);
    border-color:var(--primary);
}

.gradient-text{
    background:linear-gradient(90deg,#6366f1,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.btn-primary{
    background:var(--primary);
    border:none;
}

.search-box{
    background:#111827;
    border:none;
    color:white;
}
.search-box:focus{
    box-shadow:0 0 0 2px var(--primary);
}
</style>
</head>

<body>

<div class="container py-5">

    <div class="text-center mb-4">
        <h1 class="gradient-text fw-bold">Command Center</h1>
        <p id="welcomeUser">Loading user...</p>
    </div>

    <!-- Search -->
    <div class="mb-4">
        <input type="text" id="searchInput"
               class="form-control form-control-lg search-box"
               placeholder="Search services...">
    </div>

    <!-- Services -->
    <div class="row g-4" id="servicesGrid"></div>

</div>

<!-- Telegram Web App -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
/* =========================
   TELEGRAM INITIALISATION
========================= */
const tg = window.Telegram.WebApp;
tg.expand();

if (tg.initDataUnsafe?.user) {
    const user = tg.initDataUnsafe.user;
    document.getElementById("welcomeUser").innerText =
        "Welcome back, " + user.first_name;
} else {
    document.getElementById("welcomeUser").innerText =
        "Welcome to the dashboard";
}

/* =========================
   SERVICE DATA
========================= */
const services = [
    {title:"Website Build", desc:"Custom static or dynamic site deployment"},
    {title:"Bot Automation", desc:"Telegram bot system setup"},
    {title:"Dashboard Setup", desc:"Admin panel integration"},
    {title:"Digital Consultation", desc:"Technical & digital advisory"},
    {title:"UI/UX Design", desc:"Modern interface design service"},
    {title:"System Optimisation", desc:"Performance & automation upgrades"}
];

/* =========================
   RENDER FUNCTION
========================= */
const grid = document.getElementById("servicesGrid");

function renderServices(list){
    grid.innerHTML="";
    list.forEach(service=>{
        grid.innerHTML+=`
        <div class="col-md-6 col-lg-4">
            <div class="card-custom p-4 h-100">
                <h5>${service.title}</h5>
                <p class="text-muted">${service.desc}</p>
                <button class="btn btn-primary w-100 mt-3"
                    onclick="requestService('${service.title}')">
                    Request
                </button>
            </div>
        </div>`;
    });
}

renderServices(services);

/* =========================
   SEARCH SYSTEM
========================= */
document.getElementById("searchInput")
.addEventListener("input",function(){
    const value=this.value.toLowerCase();
    const filtered=services.filter(s=>
        s.title.toLowerCase().includes(value)
    );
    renderServices(filtered);
});

/* =========================
   SERVICE REQUEST HANDLER
========================= */
function requestService(name){
    tg.sendData(JSON.stringify({
        action:"service_request",
        service:name,
        user:tg.initDataUnsafe?.user?.id || "guest"
    }));

    tg.showPopup({
        title:"Request Sent",
        message:"Your request for " + name + " has been sent.",
        buttons:[{type:"ok"}]
    });
}

/* =========================
   TEXTURE RANDOMISER
========================= */
const textures = [
    "linear-gradient(135deg,#0f172a,#1e293b)",
    "linear-gradient(135deg,#1e3a8a,#0f172a)",
    "linear-gradient(135deg,#312e81,#1e293b)",
    "linear-gradient(135deg,#0f2027,#203a43)"
];

document.body.style.background =
    textures[Math.floor(Math.random()*textures.length)];
</script>

</body>
</html>
